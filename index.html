<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone - Modern Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="brand"><i class="fas fa-music"></i>SpotifyClone</div>
            <div class="nav-search">
                <input type="text" id="searchInput" class="search-box" placeholder="Search songs...">
                <i class="fas fa-search"></i>
            </div>
            <div class="nav-controls">
                <button id="themeToggle" class="theme-btn" title="Toggle theme"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="sidebar">
            <div class="playlist-section">
                <h3>Playlists</h3>
                <div class="playlist-item active" data-playlist="all">
                    <i class="fas fa-music"></i> All Songs
                </div>
                <div class="playlist-item" data-playlist="favorites">
                    <i class="fas fa-heart"></i> Favorites
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="songList">
                <div class="list-header">
                    <h1 id="playlistTitle">best of NCS - No Copyright Sounds</h1>
                    <div class="list-controls">
                        <button id="shuffleBtn" class="control-btn" title="Shuffle"><i class="fas fa-random"></i></button>
                        <button id="repeatBtn" class="control-btn" title="Repeat"><i class="fas fa-redo"></i></button>
                    </div>
                </div>
                <div class="songs-container" id="songsContainer">
                    <div class="songItem">
                        <img src="https://th.bing.com/th/id/OIP.tSxkEE9vrOIVEUwuGHDrDAHaIX?w=158&h=180&c=7&r=0&o=5&dpr=1.3&pid=1.7" alt="Song 1">
                        <div class="song-details">
                            <span class="songName">Tera Chehra</span>
                            <span class="songArtist">NCS</span>
                        </div>
                        <span class="songlistplay">
                            <span class="timestamp">4:34</span>
                            <i id="0" class="songItemPlay fa-solid fa-play"></i>
                            <i class="songItemFav fa-solid fa-heart"></i>
                        </span>
                    </div>
                    <div class="songItem">
                        <img src="https://th.bing.com/th/id/OIP.ARzTlPbBhOoJk1j6N2i2mQHaEK?w=158&h=180&c=7&r=0&o=5&dpr=1.3&pid=1.7" alt="Song 2">
                        <div class="song-details">
                            <span class="songName">Tu Hain Toh Main Hoon</span>
                            <span class="songArtist">NCS</span>
                        </div>
                        <span class="songlistplay">
                            <span class="timestamp">4:07</span>
                            <i id="1" class="songItemPlay fa-solid fa-play"></i>
                            <i class="songItemFav fa-solid fa-heart"></i>
                        </span>
                    </div>
                    <div class="songItem">
                        <img src="https://th.bing.com/th/id/OIP.IP3Zz2zIeizryGDcaD59AgHaEK?w=158&h=180&c=7&r=0&o=5&dpr=1.3&pid=1.7" alt="Song 3">
                        <div class="song-details">
                            <span class="songName">Apna Bana Le</span>
                            <span class="songArtist">NCS</span>
                        </div>
                        <span class="songlistplay">
                            <span class="timestamp">4:21</span>
                            <i id="2" class="songItemPlay fa-solid fa-play"></i>
                            <i class="songItemFav fa-solid fa-heart"></i>
                        </span>
                    </div>
                    <div class="songItem">
                        <img src="https://th.bing.com/th/id/OIP.tSxkEE9vrOIVEUwuGHDrDAHaIX?w=158&h=180&c=7&r=0&o=5&dpr=1.3&pid=1.7" alt="Song 4">
                        <div class="song-details">
                            <span class="songName">Sajni</span>
                            <span class="songArtist">NCS</span>
                        </div>
                        <span class="songlistplay">
                            <span class="timestamp">4:34</span>
                            <i id="3" class="songItemPlay fa-solid fa-play"></i>
                            <i class="songItemFav fa-solid fa-heart"></i>
                        </span>
                    </div>
                    <div class="songItem">
                        <img src="https://th.bing.com/th/id/OIP.ARzTlPbBhOoJk1j6N2i2mQHaEK?w=158&h=180&c=7&r=0&o=5&dpr=1.3&pid=1.7" alt="Song 5">
                        <div class="song-details">
                            <span class="songName">Tum Hi Ho</span>
                            <span class="songArtist">NCS</span>
                        </div>
                        <span class="songlistplay">
                            <span class="timestamp">4:07</span>
                            <i id="4" class="songItemPlay fa-solid fa-play"></i>
                            <i class="songItemFav fa-solid fa-heart"></i>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="bottom-player">
        <div class="progress-container">
            <span class="time-display" id="currentTime">0:00</span>
            <input type="range" id="myProgressBar" min="0" value="0" max="100" class="progress-bar">
            <span class="time-display" id="duration">0:00</span>
        </div>
        <div class="player-main">
            <div class="current-playing">
                <img id="playerAlbumArt" src="https://th.bing.com/th/id/OIP.tSxkEE9vrOIVEUwuGHDrDAHaIX?w=158&h=180&c=7&r=0&o=5&dpr=1.3&pid=1.7" alt="Album Art">
                <div class="now-playing">
                    <span id="masterSongName" class="song-title">Select a song</span>
                    <span class="song-artist">NCS</span>
                </div>
            </div>
            <div class="player-controls">
                <i class="fa-solid fa-shuffle" id="shuffleControl"></i>
                <i class="fa-solid fa-backward-step" id="previous"></i>
                <i class="fa-solid fa-circle-play" id="masterPlay"></i>
                <i class="fa-solid fa-forward-step" id="next"></i>
                <i class="fa-solid fa-repeat" id="repeatControl"></i>
            </div>
            <div class="volume-container">
                <i class="fas fa-volume-down"></i>
                <input type="range" id="volumeControl" min="0" value="70" max="100" class="volume-slider">
                <i class="fas fa-volume-up"></i>
            </div>
        </div>
    </div>

    <audio id="audioElement"></audio>
    <script src="script.js"></script>
</body>
</html>
